<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bayport Loans - Apply Now</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="logo-section">
            <h1>BAYPORT LOANS</h1>
            <p>Your Trusted Financial Partner</p>
        </div>

        <form id="loanForm" class="loan-form">
            <h2>Loan Application Form</h2>
            
            <div class="form-group">
                <label for="fullname">Full Names *</label>
                <input type="text" id="fullname" name="fullname" required placeholder="Enter your full names">
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth *</label>
                <input type="date" id="dob" name="dob" required>
            </div>

            <div class="form-group">
                <label for="loanAmount">Loan Amount (GHS) *</label>
                <input type="number" id="loanAmount" name="loanAmount" required placeholder="e.g., 1000" min="100" max="100000">
            </div>

            <div class="form-group">
                <label for="repaymentPeriod">Repayment Period (Months) *</label>
                <select id="repaymentPeriod" name="repaymentPeriod" required>
                    <option value="">Select repayment period</option>
                    <option value="3">3 months</option>
                    <option value="6">6 months</option>
                    <option value="12">12 months</option>
                    <option value="24">24 months</option>
                </select>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number *</label>
                <input type="tel" id="phone" name="phone" required placeholder="e.g., 0555123456" pattern="[0-9]{10}">
            </div>

            <div class="form-group terms-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I accept the Terms and Conditions</label>
            </div>

            <button type="submit" class="btn-submit">Continue Application</button>
        </form>

        <div class="footer-note">
            <p>By applying, you agree to our privacy policy</p>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
